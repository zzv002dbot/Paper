name: Build Paper 26.1

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to build
        required: false
        default: dev/26.1
        type: string
  push:
    branches:
      - dev/26.1
  pull_request:
    branches:
      - dev/26.1

permissions:
  contents: read

concurrency:
  group: build-paper-26-1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-home

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}

      - name: Checkout source
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Validate 26.1 source
        run: |
          VERSION="$(grep '^version=' gradle.properties | cut -d'=' -f2)"
          MC_VERSION="$(grep '^mcVersion=' gradle.properties | cut -d'=' -f2)"
          echo "Detected version=${VERSION}, mcVersion=${MC_VERSION}"
          if [[ "${MC_VERSION}" != "26.1" ]]; then
            echo "::error::This workflow is for 26.1 only, but current mcVersion is ${MC_VERSION}."
            exit 1
          fi

      - name: Configure Git identity
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"

      - name: Clean stale paperweight cache
        run: |
          rm -rf paper-server/.gradle/caches/paperweight/oldPaper || true
          rm -rf "${GRADLE_USER_HOME}/caches/paperweight/oldPaper" || true

      - name: Apply patches
        run: ./gradlew :paper-server:applyPatches --stacktrace --no-daemon --console=plain

      - name: Build server and paperclip jar
        run: ./gradlew :paper-server:build :paper-server:createPaperclipJar --stacktrace --no-daemon --console=plain

      - name: Upload paperweight logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paperweight-logs-${{ github.run_number }}
          path: |
            paper-server/.gradle/caches/paperweight/**/*.log
            .gradle-home/caches/paperweight/**/*.log
            paper-server/build/reports/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-26.1-${{ github.run_number }}
          path: |
            paper-server/build/libs/paper-paperclip-*.jar
            paper-server/build/libs/paper-*.jar
          if-no-files-found: error
          retention-days: 14
